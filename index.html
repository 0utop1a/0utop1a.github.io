<!DOCTYPE html>
<html>
<head>
<title>UTOP1A</title>

<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

/* UFO */

.logo{
width:160px;
position:absolute;
top:15px;
left:50%;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{
transform:translateX(-50%) rotateY(0deg);
}
to{
transform:translateX(-50%) rotateY(360deg);
}
}

/* CENTER */

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* FOLDER */

.file{
position:relative;
width:110px;
height:70px;
cursor:pointer;
perspective:1500px;
}

.work-5{
position:absolute;
width:100%;
height:100%;
background:#d97706;
border-radius:12px 12px 12px 0;
transition:0.3s;
}

.work-4,
.work-3,
.work-2{
position:absolute;
inset:3px;
border-radius:12px;
transform-origin:bottom;
transition:0.3s;
}

.work-4{
background:#a1a1aa;
}

.work-3{
background:#d4d4d8;
}

.work-2{
background:#e4e4e7;
}

.work-1{
position:absolute;
bottom:0;
width:100%;
height:68px;
background:linear-gradient(to top,#d97706,#f59e0b);
border-radius:12px 12px 12px 0;
transform-origin:bottom;
transition:0.3s;
}

.file:hover .work-4{
transform:rotateX(-20deg);
}

.file:hover .work-3{
transform:rotateX(-30deg);
}

.file:hover .work-2{
transform:rotateX(-38deg);
}

.file:hover .work-1{
transform:rotateX(-46deg);
}

/* TEXT */

.text{
color:white;
opacity:0.2;
font-size:16px;
letter-spacing:4px;
margin-top:18px;
}

</style>
</head>

<body>

<img src="https://i.ibb.co/Kp4kHgnm/1fbbdb74-113c-4a40-9caf-3ee1d830bb44-66c3ae0ccb8dd3-67838762.jpg" class="logo">

<div class="center">

<div class="file">
<div class="work-5"></div>
<div class="work-4"></div>
<div class="work-3"></div>
<div class="work-2"></div>
<div class="work-1"></div>
</div>

<div class="text">bourdain</div>

</div>

</body>
</html>
