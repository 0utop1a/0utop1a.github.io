<!DOCTYPE html>
<html>
<head>
<title>UTOP1A</title>

<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background:black;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
}

/* UFO */

.logo{
width:160px;
position:absolute;
top:15px;
left:50%;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{
transform:translateX(-50%) rotateY(0deg);
}
to{
transform:translateX(-50%) rotateY(360deg);
}
}

/* CENTER */

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* BUTTON */

.button{
position:relative;
display:flex;
align-items:center;
justify-content:center;
width:2.8em;
height:2.8em;
border:none;
cursor:pointer;
border-radius:0.4em;
background:rgba(235,252,254,0.8);
}

.container{
position:relative;
width:2.1em;
height:1.9em;
background:none;
overflow:hidden;
}

.folder{
position:absolute;
}

.folder_one{
bottom:0;
width:100%;
height:88%;
border-radius:2px;
border-top:1.5px solid rgb(206,167,39);
background:linear-gradient(-35deg,rgb(238,194,47) 5%,rgb(255,223,118));
}

.folder_two{
top:5%;
width:38%;
height:19%;
border-top-left-radius:2px;
border-top-right-radius:2px;
border-bottom-right-radius:2px;
background-color:rgb(206,167,39);
}

.folder_two::before{
content:"";
position:absolute;
left:88%;
width:0;
height:0;
border-left:5px solid rgb(206,167,39);
border-top:0.2em solid transparent;
border-bottom:0.2em solid transparent;
}

.folder_three{
display:flex;
align-items:center;
justify-content:center;
left:0.3em;
bottom:0;
width:1.5em;
height:0.55em;
border-radius:3px 3px 0 0;
background:linear-gradient(-35deg,rgb(25,102,218),rgb(109,165,249));
}

.folder_four{
left:0.6em;
bottom:0.18em;
width:0.9em;
height:0.12em;
border-radius:1em;
background-color:rgb(20,77,163);
}

.active_line{
position:absolute;
bottom:0;
width:0.5em;
height:0.2em;
background-color:#999;
border-radius:1em;
transition:0.15s;
}

/* TEXT */

.text{
color:white;
opacity:0.2;
font-size:10px;
letter-spacing:3px;
margin-top:10px;
}

</style>
</head>

<body>

<img src="https://i.ibb.co/Kp4kHgnm/1fbbdb74-113c-4a40-9caf-3ee1d830bb44-66c3ae0ccb8dd3-67838762.jpg" class="logo">

<div class="center">

<button class="button">

<div class="container">

<div class="folder folder_one"></div>
<div class="folder folder_two"></div>

<div class="folder folder_three">
<div class="folder folder_four"></div>
</div>

<div class="active_line"></div>

</div>

</button>

<div class="text">bourdain</div>

</div>

</body>
</html>
