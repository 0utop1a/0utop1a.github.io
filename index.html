<!DOCTYPE html>
<html>
<head>
<title>UTOP1A</title>
<link rel="icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
margin:0;
height:100vh;
overflow:hidden;
}

/* logo */
.logo{
width:220px;
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
animation:spin 10s linear infinite;
}

/* rotation */
@keyframes spin{
from{
transform:translateX(-50%) rotateY(0deg);
}
to{
transform:translateX(-50%) rotateY(360deg);
}
}
</style>
</head>

<body>

<img src="https://i.ibb.co/Kp4kHgnm/1fbbdb74-113c-4a40-9caf-3ee1d830bb44-66c3ae0ccb8dd3-67838762.jpg" class="logo">
